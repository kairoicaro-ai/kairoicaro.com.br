<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPI Dashboard — Portal KIAA</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://kairoicaro.com.br/portal-kpi.html">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://cdn.jsdelivr.net https://jrsffuneyoglnyjvdqiv.supabase.co https://fonts.googleapis.com https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://*.supabase.co; object-src 'none';">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/png" href="img/icone-positivo-verde.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --blue: #0F2944;
            --blue-dark: #0a1e33;
            --blue-light: #153358;
            --green: #86E600;
            --green-light: #97F513;
            --green-dark: #6abf00;
            --white: #FFFFFF;
            --bg: #F0F4F8;
            --card: #FFFFFF;
            --border: #E2E8F0;
            --text: #1E293B;
            --text-muted: #64748B;
            --text-light: #94A3B8;
            --red: #EF4444;
            --red-light: #FEE2E2;
            --red-dark: #DC2626;
            --orange: #F59E0B;
            --orange-light: #FEF3C7;
            --teal: #14B8A6;
            --purple: #8B5CF6;
            --gold: #D4A017;
            --indigo: #6366F1;
            --pink: #EC4899;
            --cyan: #06B6D4;
            --sidebar-w: 260px;
            --header-h: 72px;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
        }

        /* ── Loading ── */
        .loading {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: var(--bg); z-index: 9999;
        }
        .loading-spinner {
            width: 48px; height: 48px;
            border: 4px solid var(--border);
            border-top-color: var(--green);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Sidebar ── */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--blue);
            color: var(--white);
            position: fixed;
            top: 0; left: 0; height: 100vh;
            display: flex; flex-direction: column;
            z-index: 100;
            transition: transform 0.3s ease;
        }
        .sidebar-logo {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .sidebar-logo img {
            max-width: 180px; height: auto;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.2));
        }
        .sidebar-nav {
            flex: 1; padding: 16px 12px; overflow-y: auto;
        }
        .nav-section-title {
            font-size: 0.65rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.15em;
            color: rgba(255,255,255,0.35);
            padding: 16px 12px 8px;
        }
        .nav-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 14px; border-radius: 10px;
            color: rgba(255,255,255,0.85);
            text-decoration: none; font-size: 0.85rem; font-weight: 500;
            transition: all 0.2s ease; cursor: pointer; margin-bottom: 2px;
        }
        .nav-item:hover {
            background: rgba(255,255,255,0.08); color: var(--white);
        }
        .nav-item.active {
            background: rgba(134,230,0,0.12); color: var(--green);
        }
        .nav-item svg {
            width: 20px; height: 20px;
            stroke: currentColor; fill: none;
            stroke-width: 2; flex-shrink: 0;
        }
        .sidebar-footer {
            padding: 16px 12px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        .user-info {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 14px;
        }
        .user-avatar {
            width: 38px; height: 38px; border-radius: 10px;
            background: linear-gradient(135deg, var(--green), var(--green-light));
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.85rem; color: var(--blue);
            flex-shrink: 0;
        }
        .user-name { font-size: 0.85rem; font-weight: 600; color: var(--white); }
        .user-email { font-size: 0.7rem; color: rgba(255,255,255,0.4); }
        .btn-logout {
            display: flex; align-items: center; gap: 8px;
            width: 100%; padding: 10px 14px; margin-top: 8px;
            border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
            background: transparent; color: rgba(255,255,255,0.5);
            font-size: 0.8rem; font-weight: 500; cursor: pointer;
            font-family: inherit; transition: all 0.2s ease;
        }
        .btn-logout:hover {
            background: rgba(239,68,68,0.15); color: var(--red);
            border-color: rgba(239,68,68,0.3);
        }
        .btn-logout svg {
            width: 18px; height: 18px;
            stroke: currentColor; fill: none; stroke-width: 2;
        }

        /* ── Main ── */
        .main {
            margin-left: var(--sidebar-w);
            flex: 1; min-height: 100vh;
        }

        /* ── Header ── */
        .main-header {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 0 32px; height: var(--header-h);
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 50;
        }
        .main-header h1 {
            font-size: 1.2rem; font-weight: 700; color: var(--blue);
        }
        .main-header .subtitle {
            font-size: 0.75rem; font-weight: 400; color: var(--text-muted);
            margin-left: 8px;
        }
        .header-actions { display: flex; align-items: center; gap: 12px; }
        .header-badge {
            display: flex; align-items: center; gap: 8px;
            padding: 6px 14px; border-radius: 20px;
            background: rgba(134,230,0,0.1); color: var(--green-dark);
            font-size: 0.75rem; font-weight: 600;
        }
        .header-badge .dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--green); animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .mobile-toggle {
            display: none; background: none; border: none;
            cursor: pointer; padding: 8px; margin-right: 8px;
        }
        .mobile-toggle svg {
            width: 24px; height: 24px; stroke: var(--blue);
            fill: none; stroke-width: 2;
        }

        /* ── Content ── */
        .content { padding: 28px 32px; }
        .section { margin-bottom: 36px; }
        .section-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
        }
        .section-title {
            font-size: 1.05rem; font-weight: 700; color: var(--blue);
            display: flex; align-items: center; gap: 10px;
        }
        .section-title .icon {
            width: 32px; height: 32px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .section-title .icon svg {
            width: 18px; height: 18px; stroke: var(--white);
            fill: none; stroke-width: 2;
        }
        .section-subtitle {
            font-size: 0.75rem; color: var(--text-muted); font-weight: 400;
        }

        /* ── Metric Cards (top row) ── */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
        }
        .metric-card {
            background: var(--white);
            border-radius: 14px;
            padding: 20px;
            border: 1px solid var(--border);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }
        .metric-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }
        .metric-card .mc-label {
            font-size: 0.7rem; font-weight: 600; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.05em;
            margin-bottom: 8px;
        }
        .metric-card .mc-value {
            font-size: 1.6rem; font-weight: 800; color: var(--blue);
            line-height: 1.1;
        }
        .metric-card .mc-sub {
            font-size: 0.7rem; color: var(--text-light); margin-top: 6px;
        }
        .metric-card .mc-accent {
            position: absolute; top: 0; right: 0;
            width: 60px; height: 60px; border-radius: 0 14px 0 60px;
            opacity: 0.08;
        }
        .metric-card.red-badge .mc-value { color: var(--red); }
        .metric-card.orange-badge .mc-value { color: var(--orange); }
        .metric-card.green-badge .mc-value { color: #16A34A; }

        /* ── Card base ── */
        .card {
            background: var(--white);
            border-radius: 14px;
            border: 1px solid var(--border);
            overflow: hidden;
        }
        .card-header {
            padding: 20px 24px 16px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        .card-title {
            font-size: 0.9rem; font-weight: 700; color: var(--blue);
        }
        .card-body { padding: 24px; }

        /* ── OKR Section ── */
        .okr-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
        }
        .okr-card {
            background: var(--white); border-radius: 14px;
            border: 1px solid var(--border); overflow: hidden;
        }
        .okr-header {
            padding: 18px 20px; background: var(--blue); color: var(--white);
        }
        .okr-header .okr-tag {
            font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.1em; color: var(--green); margin-bottom: 6px;
        }
        .okr-header .okr-objective {
            font-size: 0.85rem; font-weight: 600; line-height: 1.4;
        }
        .okr-body { padding: 16px 20px; }
        .kr-item {
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
        }
        .kr-item:last-child { border-bottom: none; }
        .kr-top {
            display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: 8px; gap: 8px;
        }
        .kr-label {
            font-size: 0.75rem; font-weight: 600; color: var(--text);
            flex: 1;
        }
        .kr-status {
            font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.05em; padding: 3px 8px; border-radius: 4px;
            white-space: nowrap;
        }
        .kr-status.on-track { background: #DCFCE7; color: #16A34A; }
        .kr-status.at-risk { background: var(--orange-light); color: #D97706; }
        .kr-status.behind { background: var(--red-light); color: var(--red-dark); }
        .kr-status.critical { background: var(--red-dark); color: var(--white); }
        .kr-detail {
            font-size: 0.68rem; color: var(--text-muted); margin-bottom: 8px;
        }
        .progress-bar {
            width: 100%; height: 6px; background: var(--border);
            border-radius: 3px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; border-radius: 3px; transition: width 0.6s ease;
        }
        .progress-fill.green { background: linear-gradient(90deg, var(--green), var(--green-light)); }
        .progress-fill.orange { background: linear-gradient(90deg, #F59E0B, #FBBF24); }
        .progress-fill.red { background: linear-gradient(90deg, var(--red), #F87171); }
        .progress-fill.blue { background: linear-gradient(90deg, var(--indigo), #818CF8); }
        .kr-pct {
            font-size: 0.65rem; font-weight: 700; color: var(--text-muted);
            margin-top: 4px; text-align: right;
        }

        /* ── Lawyer Table ── */
        .table-wrap { overflow-x: auto; }
        .data-table {
            width: 100%; border-collapse: collapse; font-size: 0.78rem;
        }
        .data-table th {
            text-align: left; padding: 12px 16px;
            font-weight: 700; font-size: 0.68rem;
            text-transform: uppercase; letter-spacing: 0.05em;
            color: var(--text-muted); background: #F8FAFC;
            border-bottom: 2px solid var(--border);
            cursor: pointer; user-select: none;
            white-space: nowrap;
        }
        .data-table th:hover { color: var(--blue); }
        .data-table td {
            padding: 12px 16px; border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }
        .data-table tr:hover td { background: #F8FAFC; }
        .data-table .name-cell {
            font-weight: 600; color: var(--blue);
            display: flex; align-items: center; gap: 10px;
        }
        .rank-badge {
            width: 24px; height: 24px; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.65rem; font-weight: 800; flex-shrink: 0;
        }
        .rank-gold { background: linear-gradient(135deg, #F59E0B, #D97706); color: #fff; }
        .rank-silver { background: linear-gradient(135deg, #94A3B8, #64748B); color: #fff; }
        .rank-bronze { background: linear-gradient(135deg, #D97706, #B45309); color: #fff; }
        .rank-default { background: var(--border); color: var(--text-muted); }
        .bar-cell { min-width: 120px; }
        .mini-bar {
            height: 8px; background: var(--border); border-radius: 4px;
            overflow: hidden; margin-top: 4px;
        }
        .mini-bar-fill {
            height: 100%; border-radius: 4px;
            transition: width 0.6s ease;
        }
        .efficiency-badge {
            display: inline-flex; padding: 4px 10px; border-radius: 6px;
            font-size: 0.7rem; font-weight: 700;
        }
        .eff-gold { background: linear-gradient(135deg, #FEF3C7, #FDE68A); color: #92400E; }
        .eff-green { background: #DCFCE7; color: #16A34A; }
        .eff-yellow { background: #FEF9C3; color: #A16207; }
        .eff-red { background: var(--red-light); color: var(--red-dark); }

        .risk-alert {
            display: flex; align-items: center; gap: 12px;
            padding: 16px 20px; border-radius: 10px;
            background: linear-gradient(135deg, #FEF2F2, #FEE2E2);
            border: 1px solid #FECACA; margin-top: 16px;
        }
        .risk-alert .ra-icon {
            width: 36px; height: 36px; border-radius: 8px;
            background: var(--red); display: flex; align-items: center;
            justify-content: center; flex-shrink: 0;
        }
        .risk-alert .ra-icon svg {
            width: 20px; height: 20px; stroke: #fff; fill: none; stroke-width: 2;
        }
        .risk-alert .ra-text {
            font-size: 0.78rem; font-weight: 600; color: var(--red-dark);
        }
        .risk-alert .ra-sub {
            font-size: 0.68rem; color: #B91C1C; font-weight: 400; margin-top: 2px;
        }

        /* ── Dual columns ── */
        .dual-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
        }
        .tri-grid {
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px;
        }

        /* ── Donut Chart (CSS) ── */
        .donut-container {
            display: flex; align-items: center; justify-content: center;
            gap: 32px; padding: 16px 0; flex-wrap: wrap;
        }
        .donut {
            width: 200px; height: 200px; border-radius: 50%;
            position: relative; flex-shrink: 0;
        }
        .donut-center {
            position: absolute; inset: 40px;
            background: var(--white); border-radius: 50%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .donut-center .dc-val {
            font-size: 1.3rem; font-weight: 800; color: var(--blue);
        }
        .donut-center .dc-label {
            font-size: 0.6rem; color: var(--text-muted); font-weight: 500;
        }
        .donut-legend {
            display: flex; flex-direction: column; gap: 8px;
        }
        .legend-item {
            display: flex; align-items: center; gap: 10px;
            font-size: 0.75rem;
        }
        .legend-dot {
            width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0;
        }
        .legend-name { font-weight: 500; color: var(--text); min-width: 110px; }
        .legend-val { font-weight: 700; color: var(--blue); }
        .legend-pct { font-weight: 500; color: var(--text-muted); font-size: 0.7rem; }

        /* ── Horizontal Bars ── */
        .hbar-list { display: flex; flex-direction: column; gap: 12px; }
        .hbar-item {}
        .hbar-top {
            display: flex; justify-content: space-between; align-items: baseline;
            margin-bottom: 4px;
        }
        .hbar-label { font-size: 0.75rem; font-weight: 600; color: var(--text); }
        .hbar-value { font-size: 0.75rem; font-weight: 700; color: var(--blue); }
        .hbar {
            height: 24px; background: var(--border); border-radius: 6px;
            overflow: hidden; position: relative;
        }
        .hbar-fill {
            height: 100%; border-radius: 6px;
            display: flex; align-items: center; justify-content: flex-end;
            padding-right: 8px; font-size: 0.6rem; font-weight: 700; color: #fff;
            transition: width 0.8s ease;
            min-width: 2px;
        }

        /* ── Funnel ── */
        .funnel { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 16px 0; }
        .funnel-step {
            display: flex; align-items: center; justify-content: center;
            height: 44px; border-radius: 8px; color: #fff;
            font-size: 0.75rem; font-weight: 600;
            transition: transform 0.2s;
            position: relative;
        }
        .funnel-step:hover { transform: scale(1.02); }
        .funnel-step .fs-count {
            font-weight: 800; margin-left: 6px;
        }
        .funnel-connector {
            width: 2px; height: 12px; background: var(--border);
        }
        .funnel-pct {
            position: absolute; right: -60px;
            font-size: 0.65rem; font-weight: 700; color: var(--text-muted);
        }

        /* ── Deadline Command Center ── */
        .deadline-grid {
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px;
        }
        .deadline-card {
            border-radius: 12px; padding: 20px; text-align: center;
        }
        .deadline-card.dc-red {
            background: linear-gradient(135deg, #FEF2F2, #FEE2E2);
            border: 2px solid #FECACA;
        }
        .deadline-card.dc-orange {
            background: linear-gradient(135deg, #FFFBEB, #FEF3C7);
            border: 2px solid #FDE68A;
        }
        .deadline-card.dc-blue {
            background: linear-gradient(135deg, #EFF6FF, #DBEAFE);
            border: 2px solid #BFDBFE;
        }
        .deadline-card .dc-number {
            font-size: 2.8rem; font-weight: 900; line-height: 1;
        }
        .dc-red .dc-number { color: var(--red); }
        .dc-orange .dc-number { color: #D97706; }
        .dc-blue .dc-number { color: #2563EB; }
        .deadline-card .dc-title {
            font-size: 0.8rem; font-weight: 700; margin-top: 8px;
            text-transform: uppercase; letter-spacing: 0.05em;
        }
        .dc-red .dc-title { color: var(--red-dark); }
        .dc-orange .dc-title { color: #92400E; }
        .dc-blue .dc-title { color: #1E40AF; }
        .deadline-card .dc-desc {
            font-size: 0.68rem; color: var(--text-muted); margin-top: 4px;
        }

        /* Timeline */
        .timeline {
            display: flex; align-items: flex-end; gap: 6px;
            padding: 20px 0 0; justify-content: center;
        }
        .timeline-day {
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            flex: 1; max-width: 80px;
        }
        .timeline-bar {
            width: 100%; border-radius: 6px 6px 0 0;
            min-height: 8px; transition: height 0.5s ease;
        }
        .timeline-label {
            font-size: 0.6rem; font-weight: 600; color: var(--text-muted);
            text-align: center;
        }
        .timeline-count {
            font-size: 0.7rem; font-weight: 800;
        }

        /* ── Waterfall ── */
        .waterfall {
            display: flex; align-items: flex-end; gap: 16px;
            padding: 20px 0; justify-content: center;
        }
        .wf-col {
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            flex: 1; max-width: 140px;
        }
        .wf-bar {
            width: 100%; border-radius: 8px 8px 0 0;
            transition: height 0.6s ease;
        }
        .wf-label { font-size: 0.7rem; font-weight: 600; color: var(--text-muted); text-align: center; }
        .wf-value { font-size: 0.8rem; font-weight: 800; color: var(--blue); }

        /* ── Heatmap ── */
        .heatmap { width: 100%; border-collapse: collapse; font-size: 0.72rem; }
        .heatmap th {
            padding: 10px 12px; font-weight: 700; font-size: 0.65rem;
            text-transform: uppercase; letter-spacing: 0.05em;
            color: var(--text-muted); background: #F8FAFC;
            border-bottom: 2px solid var(--border); text-align: center;
        }
        .heatmap th:first-child { text-align: left; }
        .heatmap td {
            padding: 10px 12px; text-align: center;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
        }
        .heatmap td:first-child {
            text-align: left; font-weight: 600; color: var(--blue);
        }
        .hm-green { background: #DCFCE7; color: #16A34A; }
        .hm-yellow { background: #FEF9C3; color: #A16207; }
        .hm-orange { background: #FEF3C7; color: #D97706; }
        .hm-red { background: #FEE2E2; color: #DC2626; }

        /* ── North Star ── */
        .north-star {
            background: linear-gradient(135deg, var(--blue), var(--blue-light));
            border-radius: 16px; padding: 48px 32px; text-align: center;
            color: var(--white); position: relative; overflow: hidden;
        }
        .north-star::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at 30% 50%, rgba(134,230,0,0.08) 0%, transparent 60%),
                        radial-gradient(circle at 70% 80%, rgba(134,230,0,0.05) 0%, transparent 50%);
        }
        .ns-tag {
            font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.2em; color: var(--green);
            margin-bottom: 12px; position: relative;
        }
        .ns-value {
            font-size: 3rem; font-weight: 900; line-height: 1;
            position: relative; margin-bottom: 8px;
        }
        .ns-label {
            font-size: 1rem; font-weight: 400;
            color: rgba(255,255,255,0.7); position: relative;
        }
        .ns-subs {
            display: flex; justify-content: center; gap: 40px;
            margin-top: 32px; position: relative; flex-wrap: wrap;
        }
        .ns-sub {
            text-align: center;
        }
        .ns-sub-val {
            font-size: 1.4rem; font-weight: 800; color: var(--green);
        }
        .ns-sub-label {
            font-size: 0.68rem; color: rgba(255,255,255,0.5); margin-top: 2px;
        }

        /* ── Insights / Recommendations ── */
        .insights-list { display: flex; flex-direction: column; gap: 12px; }
        .insight-item {
            display: flex; align-items: flex-start; gap: 14px;
            padding: 16px 20px; border-radius: 10px;
            border: 1px solid var(--border); background: var(--white);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .insight-item:hover {
            transform: translateX(4px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
        }
        .insight-icon {
            width: 36px; height: 36px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .insight-icon svg {
            width: 18px; height: 18px; stroke: #fff; fill: none; stroke-width: 2;
        }
        .insight-priority {
            font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.08em; margin-bottom: 2px;
        }
        .insight-text {
            font-size: 0.78rem; font-weight: 600; color: var(--text);
        }
        .insight-detail {
            font-size: 0.68rem; color: var(--text-muted); margin-top: 4px;
            line-height: 1.5;
        }

        /* ── Monthly Trend ── */
        .trend-chart {
            display: flex; align-items: flex-end; gap: 8px;
            padding: 20px 0; justify-content: center;
        }
        .trend-col {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            flex: 1; max-width: 80px;
        }
        .trend-bars {
            display: flex; gap: 3px; align-items: flex-end; width: 100%;
        }
        .trend-bar {
            flex: 1; border-radius: 4px 4px 0 0;
            min-height: 4px; transition: height 0.5s ease;
        }
        .trend-month {
            font-size: 0.65rem; font-weight: 600; color: var(--text-muted);
        }

        /* ── Ticker Ratio Table ── */
        .ratio-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
        }
        .ratio-card {
            text-align: center; padding: 16px; border-radius: 10px;
            border: 1px solid var(--border);
        }
        .ratio-area {
            font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.05em; margin-bottom: 6px;
        }
        .ratio-value {
            font-size: 1.3rem; font-weight: 900; color: var(--blue);
        }
        .ratio-label {
            font-size: 0.6rem; color: var(--text-muted); margin-top: 2px;

        /* ── Gap ── */
        .gap-display {
            display: flex; align-items: center; justify-content: center;
            gap: 24px; padding: 20px 0; flex-wrap: wrap;
        }
        .gap-block { text-align: center; }
        .gap-block .gb-val { font-size: 1.6rem; font-weight: 900; }
        .gap-block .gb-label { font-size: 0.68rem; color: var(--text-muted); margin-top: 2px; }
        .gap-arrow {
            font-size: 1.4rem; color: var(--text-light); font-weight: 300;
        }

        /* ── Responsive ── */
        @media (max-width: 1200px) {
            .metrics-grid { grid-template-columns: repeat(3, 1fr); }
            .okr-grid { grid-template-columns: 1fr; }
            .dual-grid { grid-template-columns: 1fr; }
            .tri-grid { grid-template-columns: 1fr; }
            .ratio-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 900px) {

        @media (max-width: 768px) {

            .content { padding: 20px 16px; }
            .main-header { padding: 0 16px; }
            .metrics-grid { grid-template-columns: 1fr 1fr; }
            .ns-value { font-size: 2rem; }
        }
        @media (max-width: 480px) {
            .metrics-grid { grid-template-columns: 1fr; }
        }

        /* ── Print ── */
        @media print {
            .sidebar, .mobile-toggle, .btn-logout { display: none !important; }
            .main { margin-left: 0 !important; }
            .metric-card, .card, .okr-card { break-inside: avoid; }
        }

        /* ── Animations ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in {
            animation: fadeUp 0.5s ease forwards;
            opacity: 0;
        }

        /* ── Accessibility: Focus indicators ── */
        :focus-visible {
            outline: 2px solid #86E600;
            outline-offset: 2px;
        }
        button:focus-visible, a:focus-visible, input:focus-visible, select:focus-visible {
            outline: 2px solid #86E600;
            outline-offset: 2px;
            box-shadow: 0 0 0 4px rgba(134, 230, 0, 0.2);
        }

    <script>
        // ================================================================
        // SUPABASE CONNECTION
        // ================================================================
        const SUPABASE_URL = 'https://jrsffuneyoglnyjvdqiv.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impyc2ZmdW5leW9nbG55anZkcWl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MTM2MzcsImV4cCI6MjA4OTk4OTYzN30.s2ShvbnbPe0VtPQV7RO6f550CbrPS13jhg_4ieOH_BY';
        const { createClient } = supabase;
        const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;

        // ================================================================
        // AUTH CHECK
        // ================================================================
        (async () => {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) {
                window.location.href = 'portal-login.html';
                return;
            }
            currentUser = session.user;
            initKPI();
        })();

        // ================================================================
        // DATA — loaded from data/advbox.json (updated by GitHub Actions)
        // ================================================================
        const areaColors = {
            'ADMINISTRATIVO': '#D97706', 'CÍVEL': '#2563EB', 'TRABALHISTA': '#DC2626',
            'AMBIENTAL': '#16A34A', 'PENAL': '#7C3AED', 'TRIBUTÁRIO': '#0891B2',
            'EMPRESARIAL': '#EC4899', 'JUSTIÇA FEDERAL': '#6366F1'
        };
        const phaseColors = ['#2563EB','#16A34A','#6366F1','#0891B2','#8B5CF6','#D97706','#EC4899','#14B8A6','#64748B','#94A3B8','#CBD5E1','#E2E8F0'];

        let lawyers = [];
        let areas = [];
        let phases = [];
        let totalCases = 0;
        let totalClients = 0;
        let totalLawyers = 0;
        let totalExpected = 0;
        let totalReceived = 0;
        let archivedCases = 0;
        let overdueDeadlines = 0;
        let criticalDeadlines = 0;
        let pendingTasks = 0;
        let conversionRate = '0';
        let ticketMedio = 0;
        let monthlyData = [];
        let timelineDays = [];
        let advboxData = null;

        async function loadAdvboxData() {
            try {
                const res = await fetch('data/advbox.json?t=' + Date.now());
                if (!res.ok) throw new Error('fetch failed');
                advboxData = await res.json();

                // Map ADVBOX data into KPI variables
                const r = advboxData.resumo;
                totalCases = r.processos_ativos;
                totalClients = r.clientes_total;
                totalLawyers = r.advogados_total;
                archivedCases = r.processos_encerrados;
                overdueDeadlines = r.prazos_vencidos;
                criticalDeadlines = r.prazos_criticos_14dias;
                pendingTasks = r.tarefas_hoje;

                const f = advboxData.financeiro;
                totalExpected = f.honorarios_esperados;
                totalReceived = f.honorarios_recebidos;
                conversionRate = ((totalReceived / totalExpected) * 100).toFixed(1);
                ticketMedio = Math.round(totalExpected / totalCases);

                // Lawyers
                lawyers = advboxData.por_responsavel.slice(0, 15).map(l => ({
                    name: l.nome, cases: l.processos, pct: l.pct,
                    expected: l.esperado, received: l.recebido
                }));

                // Areas
                areas = advboxData.por_area.filter(a => a.processos > 0).map(a => ({
                    name: a.area, cases: a.processos, pct: a.pct,
                    expected: a.esperado, color: areaColors[a.area] || '#94A3B8'
                }));

                // Phases
                phases = advboxData.por_fase.map((p, i) => ({
                    name: p.fase, cases: p.processos, pct: p.pct,
                    color: phaseColors[i] || '#CBD5E1'
                }));

                // Timeline deadlines from prazos_criticos
                const pc = advboxData.prazos_criticos;
                timelineDays = [
                    { day: 'Vencidos', count: pc.vencidos, color: 'var(--red)' },
                    { day: 'Críticos', count: pc.criticos_proximos, color: '#D97706' },
                    { day: '14 dias', count: pc.proximos_14dias, color: '#F59E0B' }
                ];

                // Monthly data (derived — current snapshot as latest month)
                monthlyData = [
                    { month: 'Mar/26', expected: totalExpected, received: totalReceived }
                ];

                // Update header badge with real date
                const updatedAt = new Date(advboxData.updated_at);
                const months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
                const badge = document.querySelector('.header-badge');
                if (badge) badge.innerHTML = '<span class="dot"></span> Dados AdvBox &mdash; ' + months[updatedAt.getMonth()] + '/' + updatedAt.getFullYear();

            } catch (err) {
                console.warn('Falha ao carregar advbox.json, usando dados de fallback:', err);
                // Fallback: minimal data so page still renders
                totalCases = 1220; totalClients = 1778; totalLawyers = 27;
                totalExpected = 149679334; totalReceived = 590370;
                archivedCases = 2985; overdueDeadlines = 32; criticalDeadlines = 84; pendingTasks = 4;
                conversionRate = '0.4'; ticketMedio = Math.round(totalExpected / totalCases);
                lawyers = [
                    { name: 'Welington Albuquerque', cases: 533, pct: 43.7, expected: 42740472, received: 453628 },
                    { name: 'Guilherme Viana', cases: 159, pct: 13.0, expected: 913232, received: 0 },
                    { name: 'Drielly Vasques', cases: 146, pct: 12.0, expected: 25865363, received: 75000 },
                    { name: 'Kairo Ícaro', cases: 96, pct: 7.9, expected: 8086847, received: 0 },
                    { name: 'Gabriel Monteiro', cases: 75, pct: 6.1, expected: 138851, received: 0 }
                ];
                areas = [
                    { name: 'ADMINISTRATIVO', cases: 331, pct: 27.1, expected: 343145, color: '#D97706' },
                    { name: 'CÍVEL', cases: 299, pct: 24.5, expected: 85656740, color: '#2563EB' },
                    { name: 'TRABALHISTA', cases: 282, pct: 23.1, expected: 11082632, color: '#DC2626' },
                    { name: 'AMBIENTAL', cases: 201, pct: 16.5, expected: 48568434, color: '#16A34A' },
                    { name: 'PENAL', cases: 76, pct: 6.2, expected: 205894, color: '#7C3AED' },
                    { name: 'TRIBUTÁRIO', cases: 21, pct: 1.7, expected: 3822487, color: '#0891B2' }
                ];
                phases = [
                    { name: 'Elaboração de Documento/Peça', cases: 331, pct: 27.1, color: '#2563EB' },
                    { name: 'Ação/Defesa Protocolada', cases: 313, pct: 25.7, color: '#16A34A' },
                    { name: 'Elab. Peça Administrativa', cases: 105, pct: 8.6, color: '#6366F1' },
                    { name: 'Requerimento Protocolado', cases: 83, pct: 6.8, color: '#0891B2' },
                    { name: 'Outras Fases', cases: 388, pct: 31.8, color: '#CBD5E1' }
                ];
                timelineDays = [
                    { day: 'Vencidos', count: 32, color: 'var(--red)' },
                    { day: 'Críticos', count: 84, color: '#D97706' },
                    { day: '14 dias', count: 533, color: '#F59E0B' }
                ];
                monthlyData = [{ month: 'Mar/26', expected: totalExpected, received: totalReceived }];
            }
        }

        // ================================================================
        // HELPERS
        // ================================================================
        function fmt(v) {
            if (v >= 1e9) return 'R$' + (v / 1e9).toFixed(1).replace('.', ',') + 'B';
            if (v >= 1e6) return 'R$' + (v / 1e6).toFixed(1).replace('.', ',') + 'M';
            if (v >= 1e3) return 'R$' + (v / 1e3).toFixed(0) + 'K';
            return 'R$' + v.toLocaleString('pt-BR');
        }
        function fmtFull(v) {
            return 'R$' + v.toLocaleString('pt-BR', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
        }
        function pct(v, total) { return total ? ((v / total) * 100).toFixed(1) : '0'; }
        function rankClass(i) {
            if (i === 0) return 'rank-gold';
            if (i === 1) return 'rank-silver';
            if (i === 2) return 'rank-bronze';
            return 'rank-default';
        }
        function effClass(score) {
            if (score >= 80) return 'eff-gold';
            if (score >= 60) return 'eff-green';
            if (score >= 40) return 'eff-yellow';
            return 'eff-red';
        }
        function effLabel(score) {
            if (score >= 80) return 'Excelente';
            if (score >= 60) return 'Bom';
            if (score >= 40) return 'Regular';
            return 'Critico';
        }

        // ================================================================
        // INIT
        // ================================================================
        async function initKPI() {
            // Load ADVBOX data before rendering
            await loadAdvboxData();

            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';

            const email = currentUser.email || '';
            const name = currentUser.user_metadata?.name || email.split('@')[0];
            const initials = name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
            document.getElementById('userName').textContent = name;
            document.getElementById('userEmail').textContent = email;
            document.getElementById('userAvatar').textContent = initials;

            renderDashboard();
        }

        function renderDashboard() {
            const c = document.getElementById('dashboardContent');
            c.innerHTML = '';

            // Compute efficiency scores for lawyers
            const avgCases = lawyers.reduce((s, l) => s + l.cases, 0) / lawyers.length;
            const avgRevenue = lawyers.reduce((s, l) => s + l.received, 0) / lawyers.length;
            lawyers.forEach(l => {
                l.conversion = l.expected > 0 ? (l.received / l.expected * 100) : 0;
                const convNorm = Math.min(l.conversion / 100, 1) * 100;
                const caseNorm = Math.min(l.cases / avgCases, 2) / 2 * 100;
                const revNorm = avgRevenue > 0 ? Math.min(l.received / avgRevenue, 3) / 3 * 100 : 0;
                l.efficiency = Math.round(convNorm * 0.4 + caseNorm * 0.3 + revNorm * 0.3);
            });

            // 1. Executive Summary
            c.innerHTML += renderExecutiveSummary();
            // 9. North Star (positioned prominently after summary)
            c.innerHTML += renderNorthStar();
            // 2. OKR Tracker
            c.innerHTML += renderOKR();
            // 3. Lawyer Performance
            c.innerHTML += renderLawyerPerformance();
            // 4. Area Intelligence + 5. Pipeline Funnel
            c.innerHTML += renderAreaAndPipeline();
            // 6. Deadline Command Center
            c.innerHTML += renderDeadlines();
            // 7. Financial Deep Dive
            c.innerHTML += renderFinancial();
            // 8. Risk Heatmap
            c.innerHTML += renderHeatmap();
            // 10. Decision Recommendations
            c.innerHTML += renderRecommendations();

            // Animate sections
            setTimeout(() => {
                document.querySelectorAll('.section').forEach((s, i) => {
                    s.style.animationDelay = (i * 0.08) + 's';
                    s.classList.add('animate-in');
                });
            }, 50);
        }

        // ================================================================
        // 1. EXECUTIVE SUMMARY
        // ================================================================
        function renderExecutiveSummary() {
            const cards = [
                { label: 'Processos Ativos', value: totalCases.toLocaleString('pt-BR'), sub: `${archivedCases} arquivados`, accent: 'var(--blue)' },
                { label: 'Valor Sob Gestao', value: fmt(totalExpected), sub: 'Expectativa total', accent: 'var(--green)' },
                { label: 'Receita Realizada', value: fmt(totalReceived), sub: pct(totalReceived, totalExpected) + '% convertido', accent: 'var(--teal)', cls: 'green-badge' },
                { label: 'Taxa de Conversao', value: conversionRate + '%', sub: 'Recebido / Esperado', accent: 'var(--indigo)' },
                { label: 'Clientes Ativos', value: totalClients.toLocaleString('pt-BR') + '+', sub: 'Base total', accent: 'var(--purple)' },
                { label: 'Advogados', value: totalLawyers.toString(), sub: 'Equipe ativa', accent: 'var(--cyan)' },
                { label: 'Prazos Vencidos', value: overdueDeadlines.toString(), sub: 'Vencem ontem', accent: 'var(--red)', cls: 'red-badge' },
                { label: 'Prazos Criticos', value: criticalDeadlines.toString(), sub: 'Hoje a 7 dias', accent: 'var(--orange)', cls: 'orange-badge' },
                { label: 'Tarefas Pendentes', value: pendingTasks.toString(), sub: 'Aguardando acao', accent: '#D97706' },
                { label: 'Ticket Medio', value: fmt(ticketMedio), sub: 'Por processo', accent: 'var(--gold)' }
            ];

            return `
            <div class="section">
                <div class="section-header">
                    <div class="section-title">
                        <div class="icon" style="background:var(--blue);">
                            <svg viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
                        </div>
                        Resumo Executivo
                        <span class="section-subtitle">&mdash; Visao geral em tempo real</span>
                    </div>
                </div>
                <div class="metrics-grid">
                    ${cards.map(c => `

                                <div style="display:flex;align-items:center;gap:4px;font-size:0.65rem;">
                                    <div style="width:12px;height:12px;border-radius:2px;background:var(--green);"></div>
                                    <span style="color:var(--text-muted);">Recebido</span>
                                </div>
                            </div>
                            <div class="trend-chart">
                                ${monthlyData.map(m => {
                                    const hExp = Math.max(10, (m.expected / maxMonthlyExp) * 160);
                                    const hRec = Math.max(4, (m.received / maxMonthlyExp) * 160);
                                    return `
                                        <div class="trend-col">
                                            <div style="font-size:0.6rem;font-weight:700;color:var(--text-muted);">${fmt(m.received)}</div>
                                            <div class="trend-bars">
                                                <div class="trend-bar" style="height:${hExp}px;background:var(--blue);opacity:0.2;"></div>
                                                <div class="trend-bar" style="height:${hRec}px;background:var(--green);"></div>
                                            </div>
                                            <div class="trend-month">${m.month}</div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Expected vs Received Waterfall -->
                <div class="card" style="margin-top:20px;">
                    <div class="card-header">
                        <div class="card-title">Waterfall: Esperado vs Recebido por Area</div>
                    </div>
                    <div class="card-body">
                        <div class="waterfall">
                            ${[...areas].sort((a, b) => b.expected - a.expected).map(a => {
                                const hExp = Math.max(8, (a.expected / maxAreaExpected * 200));
                                return `
                                    <div class="wf-col">
                                        <div class="wf-value">${fmt(a.expected)}</div>
                                        <div class="wf-bar" style="height:${hExp}px; background:${a.color}; opacity:0.7;"></div>
                                        <div class="wf-label">${a.name}</div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                </div>
            </div>`;
        }

            return `
            <div class="section">
                <div class="section-header">
                    <div class="section-title">
                        <div class="icon" style="background:var(--orange);">
                            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg>

                    </div>
                </div>
                <div class="card">

                        <div class="table-wrap">

                                        <th>Carga de Trabalho</th>
                                        <th>Receita</th>

                                        <th>Risco Geral</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${heatData.map(h => `
                                        <tr>
                                            <td>${h.area}</td>
                                            <td class="${h.workload}">${cellLabel(h.workload)}</td>
                                            <td class="${h.revenue}">${cellLabel(h.revenue)}</td>
                                            <td class="${h.deadlines}">${cellLabel(h.deadlines)}</td>
                                            <td class="${h.aging}">${cellLabel(h.aging)}</td>
                                            <td class="${scoreColor(h.score)}" style="font-weight:800;">${h.score}</td>
                                        </tr>

                            </table>

                        <div style="margin-top:16px;display:flex;gap:16px;flex-wrap:wrap;justify-content:center;">
                            <div style="display:flex;align-items:center;gap:6px;font-size:0.65rem;">
                                <div style="width:16px;height:16px;border-radius:3px;background:#DCFCE7;"></div>
                                <span style="color:var(--text-muted);">Baixo</span>
                            </div>
                            <div style="display:flex;align-items:center;gap:6px;font-size:0.65rem;">
                                <div style="width:16px;height:16px;border-radius:3px;background:#FEF9C3;"></div>
                                <span style="color:var(--text-muted);">Moderado</span>
                            </div>

                                <span style="color:var(--text-muted);">Critico</span>
                            </div>

        // ================================================================
        // TABLE SORTING
        // ================================================================
        let sortCol = -1;
        let sortAsc = true;

        function sortTable(col) {
            const table = document.getElementById('lawyerTable');
            if (!table) return;
            const tbody = table.querySelector('tbody');
            const rows = Array.from(tbody.querySelectorAll('tr'));

            if (sortCol === col) {
                sortAsc = !sortAsc;
            } else {
                sortCol = col;
                sortAsc = true;
            }

            rows.sort((a, b) => {
                let aVal = a.cells[col]?.textContent.trim() || '';
                let bVal = b.cells[col]?.textContent.trim() || '';

                // Try numeric
                const aNum = parseFloat(aVal.replace(/[^0-9.,-]/g, '').replace(',', '.'));
                const bNum = parseFloat(bVal.replace(/[^0-9.,-]/g, '').replace(',', '.'));

                if (!isNaN(aNum) && !isNaN(bNum)) {
                    return sortAsc ? aNum - bNum : bNum - aNum;
                }
                return sortAsc ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
            });

            rows.forEach(r => tbody.appendChild(r));
        }

        // ================================================================
        // UTILITIES
        // ================================================================
        function toggleSidebar() {

    <!-- Event listeners replacing inline handlers (XSS hardening) -->
    <script>
    (function() {
        // Skip link
        var skipLink = document.querySelector('.skip-link');
        if (skipLink) {
            skipLink.addEventListener('focus', function() { this.style.top = '0'; });
            skipLink.addEventListener('blur', function() { this.style.top = '-40px'; });
        }
        // Logout button
        var logoutBtn = document.querySelector('.btn-logout');
        if (logoutBtn) {
            logoutBtn.removeAttribute('onclick');
            logoutBtn.addEventListener('click', function() { handleLogout(); });
        }
        // Mobile toggle
        var mobileBtn = document.querySelector('.mobile-toggle');
        if (mobileBtn) {
            mobileBtn.removeAttribute('onclick');
            mobileBtn.addEventListener('click', function() { toggleSidebar(); });
        }
        // Sidebar nav items with localStorage
        document.querySelectorAll('.nav-item[onclick]').forEach(function(el) {
            var section = el.getAttribute('onclick').match(/setItem\('portalSection','(\w+)'\)/);
            if (section) {
                var sectionName = section[1];
                el.removeAttribute('onclick');
                el.addEventListener('click', function() { localStorage.setItem('portalSection', sectionName); });
            }
        });
    })();
    </script>
