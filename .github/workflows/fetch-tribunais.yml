name: Atualizar Informativos dos Tribunais

on:
  schedule:
    - cron: '17 */6 * * *'  # A cada 6 horas (minuto 17 para evitar pico)
  workflow_dispatch:  # Permite execucao manual

jobs:
  fetch-feeds:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4 lxml

      - name: Buscar informativos dos tribunais
        run: python scripts/fetch_tribunais.py

      - name: Commit e push se houver mudancas
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/informativos.json
          git diff --staged --quiet || git commit -m "Atualizar informativos dos tribunais [auto]"
          git push
