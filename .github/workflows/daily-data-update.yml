name: Atualização Diária de Dados (04h BRT)

on:
  schedule:
    - cron: '0 8 * * *'  # 08:00 UTC = 04:00 BRT
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install requests beautifulsoup4 lxml

      - name: Buscar informativos dos tribunais
        run: python scripts/fetch_tribunais.py

      - name: Buscar dados do dashboard
        run: python scripts/fetch_dashboard_data.py

      - name: Commit e push se houver mudanças
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Atualização diária de dados [auto] $(date -u +%Y-%m-%d)"
          git push
