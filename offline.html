<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sem Conexão — KIAA Portal</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" href="img/icone-positivo-verde.png">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0F2944;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .offline-container {
            text-align: center;
            max-width: 420px;
        }

        .offline-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 32px;
            border-radius: 50%;
            background: rgba(134, 230, 0, 0.1);
            border: 2px solid rgba(134, 230, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .offline-icon svg {
            width: 36px;
            height: 36px;
            stroke: #86E600;
            fill: none;
            stroke-width: 2;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #FFFFFF;
            margin-bottom: 12px;
        }

        h1 span {
            color: #86E600;
        }

        p {
            font-size: 1rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.7;
            margin-bottom: 32px;
        }

        .btn-retry {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 32px;
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 700;
            color: #0F2944;
            background: #86E600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-retry:hover {
            background: #97F513;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(134, 230, 0, 0.3);
        }

        .btn-retry:active {
            transform: translateY(0);
        }

        .btn-retry svg {
            width: 18px;
            height: 18px;
            stroke: #0F2944;
            fill: none;
            stroke-width: 2;
        }

        .footer-text {
            margin-top: 48px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>

    <div class="offline-container">
        <div class="offline-icon">
            <svg viewBox="0 0 24 24">
                <line x1="1" y1="1" x2="23" y2="23"/>
                <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
                <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
                <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
                <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
                <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
                <line x1="12" y1="20" x2="12.01" y2="20"/>
            </svg>
        </div>

        <h1>Sem <span>conexão</span></h1>
        <p>Verifique sua internet e tente novamente. O portal precisa de conexão para carregar seus dados.</p>

        <button class="btn-retry" onclick="window.location.reload()">
            <svg viewBox="0 0 24 24"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
            Tentar novamente
        </button>

        <p class="footer-text">KIAA — Kairo Ícaro Advogados Associados</p>
    </div>

</body>
</html>
